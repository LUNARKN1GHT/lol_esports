[tool.ruff]
line-length = 100
target-version = "py311"
extend-include = ["*.ipynb"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
]
ignore = [
    "E402",  # notebook 里 import 顺序常被打断
    "E501",  # 长行交给 formatter
    "B008",  # 允许函数默认参数里调用（pandas/plt 常见）
]

[tool.ruff.lint.per-file-ignores]
"*.ipynb" = ["F401"]  # notebook 里允许未使用的 import（保留备用包）

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
