[tool.ruff]
line-length = 100
target-version = "py311"
extend-include = ["*.ipynb"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
    "SIM", # flake8-simplify
    "C4",  # flake8-comprehensions
    "N",   # pep8-naming
]
ignore = [
    "E501",  # 长行交给 formatter
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.pyright]
reportMissingTypeStubs = "none"

[tool.mypy]
ignore_missing_imports = true
